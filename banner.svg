<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Mike Nelson // Presentations Archive</title>
  <defs>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050a0f" />
      <stop offset="50%"  stop-color="#0a1628" />
      <stop offset="100%" stop-color="#050a0f" />
    </linearGradient>

    <!-- Cyan glow gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4ff" />
      <stop offset="60%"  stop-color="#00aadd" />
      <stop offset="100%" stop-color="#ff6b2b" />
    </linearGradient>

    <!-- Horizontal scan line gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0" />
      <stop offset="50%"  stop-color="#00d4ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e3a5c" stroke-width="0.5" opacity="0.6"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Strong glow for title -->
    <filter id="titleGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Clip to canvas -->
    <clipPath id="canvas">
      <rect width="900" height="200" />
    </clipPath>

  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="8" />
  <rect width="900" height="200" fill="url(#grid)" rx="8" opacity="0.4" />

  <!-- ── Animated scan line sweep ── -->
  <rect width="900" height="200" fill="url(#scanGrad)" rx="8" clip-path="url(#canvas)">
    <animateTransform attributeName="transform" type="translate"
      from="-900 0" to="900 0"
      dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1" />
  </rect>

  <!-- ── Corner brackets ── -->
  <!-- Top-left -->
  <path d="M 20 40 L 20 18 L 42 18" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" />
  </path>
  <!-- Top-right -->
  <path d="M 858 18 L 880 18 L 880 40" fill="none" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="1.5s" repeatCount="indefinite" />
  </path>
  <!-- Bottom-left -->
  <path d="M 20 160 L 20 182 L 42 182" fill="none" stroke="#ff6b2b" stroke-width="1.8" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="0.75s" repeatCount="indefinite" />
  </path>
  <!-- Bottom-right -->
  <path d="M 858 182 L 880 182 L 880 160" fill="none" stroke="#ff6b2b" stroke-width="1.8" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="2.25s" repeatCount="indefinite" />
  </path>

  <!-- ── Top separator line (animated draw) ── -->
  <line x1="48" y1="28" x2="852" y2="28" stroke="#0e3a5c" stroke-width="1"
    stroke-dasharray="804" stroke-dashoffset="804">
    <animate attributeName="stroke-dashoffset" from="804" to="0" dur="1.2s" fill="freeze"
      calcMode="spline" keySplines="0.4 0 0.6 1" />
  </line>

  <!-- ── Bottom separator line (animated draw, reversed) ── -->
  <line x1="852" y1="172" x2="48" y2="172" stroke="#0e3a5c" stroke-width="1"
    stroke-dasharray="804" stroke-dashoffset="804">
    <animate attributeName="stroke-dashoffset" from="804" to="0" dur="1.2s" begin="0.2s" fill="freeze"
      calcMode="spline" keySplines="0.4 0 0.6 1" />
  </line>

  <!-- ── Accent line under title (cyan→orange gradient) ── -->
  <line x1="48" y1="132" x2="580" y2="132" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.7"
    stroke-dasharray="532" stroke-dashoffset="532">
    <animate attributeName="stroke-dashoffset" from="532" to="0" dur="0.8s" begin="0.6s" fill="freeze"
      calcMode="spline" keySplines="0.25 0.1 0.25 1" />
  </line>

  <!-- ── Decorative vertical tick marks ── -->
  <g opacity="0.5">
    <line x1="48"  y1="24" x2="48"  y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="130" y1="24" x2="130" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="212" y1="24" x2="212" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="294" y1="24" x2="294" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="376" y1="24" x2="376" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="458" y1="24" x2="458" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="540" y1="24" x2="540" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="622" y1="24" x2="622" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="704" y1="24" x2="704" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="786" y1="24" x2="786" y2="32" stroke="#00d4ff" stroke-width="1" />
    <line x1="852" y1="24" x2="852" y2="32" stroke="#00d4ff" stroke-width="1" />
  </g>

  <!-- ── Repo tag line ── -->
  <text x="48" y="58"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#00688a" letter-spacing="3"
    opacity="0">
    // REPOSITORY INDEX · MIKENELSON-IO · GITHUB.COM
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze" />
  </text>

  <!-- ── Main title ── -->
  <text x="46" y="115"
    font-family="'Courier New', Courier, monospace"
    font-weight="bold"
    font-size="46"
    fill="url(#titleGrad)"
    filter="url(#titleGlow)"
    letter-spacing="2"
    opacity="0">
    MIKE NELSON
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.4s" fill="freeze" />
  </text>

  <!-- ── Slash divider ── -->
  <text x="430" y="115"
    font-family="'Courier New', Courier, monospace"
    font-weight="bold"
    font-size="46"
    fill="#ff6b2b"
    opacity="0">
    //
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.7s" fill="freeze" />
  </text>

  <!-- ── Subtitle ── -->
  <text x="48" y="155"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#4a7a99"
    letter-spacing="4"
    opacity="0">
    PRESENTATIONS · DEMOS · ARTICLES · PODCASTS · AND MORE
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.8s" fill="freeze" />
  </text>

  <!-- ── Pulsing dot (status indicator) ── -->
  <circle cx="856" cy="100" r="5" fill="#39ff6a" opacity="0.9" filter="url(#glow)">
    <animate attributeName="r"       values="5;7;5"     dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="844" y="88"
    font-family="'Courier New', Courier, monospace"
    font-size="8" fill="#39ff6a" text-anchor="middle" letter-spacing="1">
    LIVE
  </text>

  <!-- ── Bottom metadata ── -->
  <text x="48" y="187"
    font-family="'Courier New', Courier, monospace"
    font-size="9" fill="#0e3a5c" letter-spacing="2">
    BRANCH:MAIN · LICENSE:MIT · 2009–2025
  </text>

  <text x="852" y="187"
    font-family="'Courier New', Courier, monospace"
    font-size="9" fill="#0e3a5c" letter-spacing="1" text-anchor="end">
    mikenelson.io
  </text>

</svg>
